{% extends "admin/base_site.html" %}

{% block content %}

<h1>Transferir créditos</h1>

<p><strong>Empresa:</strong> {{ empresa.nombre }}</p>
<p><strong>Saldo actual:</strong> {{ wallet.balance }} créditos</p>

<hr>

<form method="post">
    {% csrf_token %}

    <label>Usuario:</label>
    <select name="user" required>
        <option value="">Seleccionar usuario</option>
        {% for user in usuarios %}
            <option value="{{ user.id }}">{{ user.username }}</option>
        {% endfor %}
    </select>

    <br><br>

    <label>Monto:</label>
    <input type="number" name="amount" min="1" required>

    <br><br>

    <button type="submit" class="button default">Transferir</button>
</form>

<br>

<a href="/admin/accounts/empresa/">← Volver</a>

{% endblock %}
