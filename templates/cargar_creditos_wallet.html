<!DOCTYPE html>
<html>
<head>
    <title>Cargar Créditos</title>
</head>
<body style="background:#0b1a2b; color:white; font-family:sans-serif;">

    <h2>Cargar créditos a {{ wallet.owner }}</h2>

    <p>Saldo actual: {{ wallet.balance }}</p>

    <form method="post">
        {% csrf_token %}

        <label>Monto:</label><br>
        <input type="number" name="amount" required><br><br>

        <label>Motivo:</label><br>
        <input type="text" name="motivo" required><br><br>

        <button type="submit">Cargar</button>
    </form>

</body>
</html>
