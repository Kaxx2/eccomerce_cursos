{% extends "admin/base_site.html" %}

{% block content %}

<div style="max-width:700px; margin:40px auto; background:#0b1f3a; padding:30px; border-radius:12px; color:white;">

    <h2>Cargar créditos</h2>

    <p><strong>Empresa:</strong> {{ empresa }}</p>
    <p><strong>Saldo actual:</strong> {{ wallet.balance_empresa }}</p>

    <form method="post">
        {% csrf_token %}

        <!-- MONTO -->
        <div style="margin-bottom:15px;">
            <label>Monto:</label><br>
            <input type="number" name="amount" required
                style="width:200px; padding:8px; background:#111; color:white; border:1px solid #555; border-radius:6px;">
        </div>

        <!-- MOTIVO -->
        <div style="margin-bottom:15px;">
            <label>Motivo:</label>

            <select id="motivo_select" name="motivo_select"
                style="width:100%; margin-top:5px; padding:10px; background:#111; color:white; border:1px solid #555; border-radius:6px;">
                
                <option value="">Seleccionar motivo</option>
                <option value="Compra de créditos empresa">Compra de créditos empresa</option>
                <option value="Recarga administrativa">Recarga administrativa</option>
                <option value="Promoción / bonificación">Promoción / bonificación</option>
                <option value="Ajuste manual">Ajuste manual</option>
                <option value="otro">Otro...</option>
            </select>

            <input 
                type="text" 
                id="motivo_custom" 
                name="motivo_custom"
                placeholder="Escribí el motivo..."
                style="display:none; width:100%; margin-top:10px; padding:10px; background:#111; color:white; border:1px solid #555; border-radius:6px;"
            >
        </div>

        <button type="submit"
            style="margin-top:10px; padding:10px 15px; background:#28a745; border:none; color:white; border-radius:6px;">
            Cargar
        </button>

    </form>

    <br>

    <a href="/admin/accounts/empresa/" style="color:#ccc;">← Volver</a>

</div>

<!-- 🔥 JS -->
<script>
    const select = document.getElementById("motivo_select");
    const inputCustom = document.getElementById("motivo_custom");

    select.addEventListener("change", function () {
        if (this.value === "otro") {
            inputCustom.style.display = "block";
        } else {
            inputCustom.style.display = "none";
            inputCustom.value = "";
        }
    });
</script>

{% endblock %}
