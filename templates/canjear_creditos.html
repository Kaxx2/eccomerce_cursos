{% extends "admin/base_site.html" %}

{% block content %}

<h1>Canjear curso</h1>

<p><strong>Usuario:</strong> {{ wallet.owner }}</p>
<p><strong>Saldo actual:</strong> {{ wallet.balance }}</p>

<hr>

<form method="post">
    {% csrf_token %}

    <label>Seleccionar curso:</label>
    <select name="curso_id">
        {% for curso in cursos %}
            <option value="{{ curso.id }}">
                {{ curso.nombre }} - {{ curso.creditos }} créditos
            </option>
        {% endfor %}
    </select>

    <button type="submit">Canjear</button>
</form>
<br>

<a href="/admin/accounts/wallet/">← Volver</a>

{% endblock %}
